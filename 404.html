<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Tidak Ditemukan - Smart Desa</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4 sm:p-6">

    <div class="max-w-lg w-full text-center">
        
        <div class="flex items-center justify-center gap-2 font-bold text-2xl text-emerald-600 tracking-tight mb-8">
            <i class="fas fa-leaf"></i> Smart<span class="text-slate-800">Desa</span>
        </div>

        <div class="relative flex justify-center items-center h-48 mb-6">
            <h1 class="text-[150px] font-extrabold text-slate-200 select-none tracking-tighter absolute">404</h1>
            <div class="relative z-10 bg-white p-4 rounded-full shadow-lg border border-slate-100 animate-bounce mt-10">
                <i class="fas fa-compass text-6xl text-emerald-500"></i>
            </div>
        </div>

        <h2 class="text-2xl sm:text-3xl font-bold text-slate-800 mb-3">Waduh! Kamu sepertinya tersesat.</h2>
        <p class="text-slate-500 text-sm sm:text-base leading-relaxed mb-8 px-4">
            Halaman yang kamu cari tidak dapat ditemukan. Mungkin halamannya sudah dipindahkan, dihapus, atau kamu salah mengetikkan alamat URL.
        </p>

        <div class="flex flex-col sm:flex-row justify-center gap-3 px-6 sm:px-0">
            <button onclick="history.back()" class="px-6 py-3 bg-white text-slate-600 font-bold rounded-xl border border-slate-200 hover:bg-slate-100 transition shadow-sm flex items-center justify-center gap-2 w-full sm:w-auto">
                <i class="fas fa-arrow-left"></i> Kembali
            </button>
            <a href="index.html" class="px-6 py-3 bg-emerald-600 text-white font-bold rounded-xl hover:bg-emerald-700 transition shadow-md hover:shadow-lg flex items-center justify-center gap-2 w-full sm:w-auto">
                <i class="fas fa-home"></i> Ke Beranda Utama
            </a>
        </div>

        <div class="mt-12 text-sm text-slate-400">
            <p>Butuh bantuan? <a href="#" class="text-emerald-600 font-semibold hover:underline">Hubungi Administrator Desa</a></p>
        </div>

    </div>

</body>
</html>
