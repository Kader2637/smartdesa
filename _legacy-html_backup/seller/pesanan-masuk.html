<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesanan Masuk - Smart Desa</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        [x-cloak] { display: none !important; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        @keyframes slide-up {
            0% { transform: translateY(100%); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .toast-animate { animation: slide-up 0.3s ease-out forwards; }
    </style>
</head>

<body class="bg-slate-50 text-slate-800" x-data="orderManager()">

    <!-- Global Toast Component -->
    <div x-cloak x-show="toast.show" class="fixed bottom-6 right-6 z-[100] toast-animate">
        <div class="bg-slate-800 text-white px-6 py-4 rounded-xl shadow-2xl flex items-center gap-4">
            <div :class="toast.type === 'success' ? 'bg-emerald-500' : 'bg-red-500'" class="w-8 h-8 rounded-full flex items-center justify-center">
                <i class="fas" :class="toast.type === 'success' ? 'fa-check' : 'fa-info'"></i>
            </div>
            <p class="font-bold text-sm" x-text="toast.msg"></p>
        </div>
    </div>

    <div class="flex h-screen overflow-hidden">

        <div x-show="sidebarOpen" x-transition.opacity class="fixed inset-0 z-20 bg-black bg-opacity-50 lg:hidden" @click="sidebarOpen = false"></div>

        <!-- Sidebar -->
        <aside :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
            class="fixed inset-y-0 left-0 z-30 w-64 bg-white border-r border-slate-200 transition-transform duration-300 lg:static lg:translate-x-0 lg:flex lg:flex-col shadow-sm">
            
            <div class="flex items-center justify-center h-20 border-b border-slate-100">
                <div class="flex items-center gap-2 font-bold text-2xl text-emerald-600 tracking-tight">
                    <i class="fas fa-store"></i> UMKM<span class="text-slate-800">Desa</span>
                </div>
            </div>

            <nav class="flex-1 px-4 py-6 space-y-1 overflow-y-auto">
                <p class="px-4 text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 mt-2">Pusat Seller</p>
                <a href="index.html" class="flex items-center gap-3 px-4 py-2.5 text-slate-500 hover:text-emerald-600 hover:bg-slate-50 rounded-lg transition-colors">
                    <i class="fas fa-chart-pie w-5 text-center"></i> <span>Dashboard Toko</span>
                </a>
                
                <p class="px-4 text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 mt-6">Manajemen Toko</p>
                <a href="kelola-produk.html" class="flex items-center gap-3 px-4 py-2.5 text-slate-500 hover:text-emerald-600 hover:bg-slate-50 rounded-lg transition-colors">
                    <i class="fas fa-box-open w-5 text-center"></i> <span>Kelola Produk</span>
                </a>
                <a href="pesanan-masuk.html" class="flex items-center gap-3 px-4 py-2.5 bg-emerald-50 text-emerald-600 font-semibold rounded-lg relative transition-colors">
                    <i class="fas fa-shopping-cart w-5 text-center"></i> <span>Pesanan Masuk</span>
                    <span class="absolute right-4 bg-red-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full" x-show="orders.filter(o=>o.status==='baru').length > 0" x-text="orders.filter(o=>o.status==='baru').length"></span>
                </a>
                <a href="status-pengiriman.html" class="flex items-center gap-3 px-4 py-2.5 text-slate-500 hover:text-emerald-600 hover:bg-slate-50 rounded-lg transition-colors">
                    <i class="fas fa-truck-fast w-5 text-center"></i> <span>Status Pengiriman</span>
                </a>
                
                <p class="px-4 text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 mt-6">Keuangan & Profil</p>
                <a href="riwayat-pendapatan.html" class="flex items-center gap-3 px-4 py-2.5 text-slate-500 hover:text-emerald-600 hover:bg-slate-50 rounded-lg transition-colors">
                    <i class="fas fa-wallet w-5 text-center"></i> <span>Riwayat Pendapatan</span>
                </a>
                <a href="profil-toko.html" class="flex items-center gap-3 px-4 py-2.5 text-slate-500 hover:text-emerald-600 hover:bg-slate-50 rounded-lg transition-colors">
                    <i class="fas fa-store-alt w-5 text-center"></i> <span>Profil & Pengaturan</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Topbar -->
            <header class="flex items-center justify-between px-6 py-4 bg-white border-b border-slate-200 shadow-sm relative z-10">
                <div class="flex items-center gap-4">
                    <button @click="sidebarOpen = true" class="text-slate-500 focus:outline-none lg:hidden hover:text-emerald-600">
                        <i class="fas fa-bars text-xl"></i>
                    </button>
                    <div class="hidden md:flex flex-col">
                        <h1 class="font-bold text-slate-800 text-lg leading-tight">Pesanan Masuk</h1>
                    </div>
                </div>
            </header>

            <main class="flex-1 overflow-x-hidden overflow-y-auto bg-slate-50 p-6">

                <!-- Tabs -->
                <div class="flex border-b border-slate-200 mb-6 font-medium text-sm">
                    <button @click="activeTab = 'baru'" :class="activeTab === 'baru' ? 'border-emerald-500 text-emerald-600' : 'border-transparent text-slate-500 hover:text-slate-700'" class="px-6 py-3 border-b-2 font-bold flex items-center gap-2 transition">
                        Pesanan Baru <span x-show="orders.filter(o=>o.status==='baru').length > 0" class="bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full" x-text="orders.filter(o=>o.status==='baru').length"></span>
                    </button>
                    <button @click="activeTab = 'diproses'" :class="activeTab === 'diproses' ? 'border-emerald-500 text-emerald-600' : 'border-transparent text-slate-500 hover:text-slate-700'" class="px-6 py-3 border-b-2 font-bold flex items-center gap-2 transition">
                        Perlu Dikirim <span x-show="orders.filter(o=>o.status==='diproses').length > 0" class="bg-emerald-500 text-white text-[10px] px-2 py-0.5 rounded-full" x-text="orders.filter(o=>o.status==='diproses').length"></span>
                    </button>
                </div>

                <div class="space-y-4">
                    <template x-for="order in orders.filter(o => o.status === activeTab)" :key="order.id">
                        <div x-transition class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 hover:shadow-md transition">
                            <div class="flex justify-between items-center mb-4 border-b border-slate-100 pb-3">
                                <div class="flex gap-3 items-center">
                                    <span class="font-bold text-slate-800 tracking-wider" x-text="order.id"></span>
                                    <span class="text-xs text-slate-400"><i class="far fa-clock"></i> <span x-text="order.time"></span></span>
                                </div>
                                <span :class="order.status === 'baru' ? 'bg-red-100 text-red-600 animate-pulse' : 'bg-emerald-100 text-emerald-700'" class="px-3 py-1 rounded text-xs font-bold uppercase tracking-wide" x-text="order.status === 'baru' ? 'Perlu Diproses' : 'Sedang Dikemas'"></span>
                            </div>
                            
                            <div class="flex flex-col md:flex-row gap-6">
                                <div class="flex-1 flex gap-4">
                                    <div class="w-20 h-20 rounded-xl bg-slate-100 flex-shrink-0 overflow-hidden border border-slate-200">
                                        <template x-if="order.img">
                                            <img :src="order.img" class="w-full h-full object-cover">
                                        </template>
                                        <template x-if="!order.img">
                                            <div class="w-full h-full flex items-center justify-center text-slate-400 bg-orange-50 text-orange-400">
                                                <i class="fas fa-box text-3xl"></i>
                                            </div>
                                        </template>
                                    </div>
                                    <div>
                                        <h4 class="font-bold text-slate-800 text-lg" x-text="order.title"></h4>
                                        <p class="text-xs text-slate-600 font-semibold mb-2"><i class="fas fa-map-marker-alt text-emerald-500"></i> <span x-text="order.customer"></span></p>
                                        <template x-if="order.note">
                                            <div class="bg-yellow-50 text-yellow-700 text-xs px-2 py-1 flex items-center gap-1 rounded border border-yellow-200 w-max"><i class="fas fa-comment-dots"></i> Catatan: "<span x-text="order.note"></span>"</div>
                                        </template>
                                    </div>
                                </div>
                                
                                <div class="w-full md:w-64 border-t md:border-t-0 md:border-l border-slate-100 pt-4 md:pt-0 md:pl-6 flex flex-col justify-center">
                                    <p class="text-sm text-slate-500 mb-1">Total Pendapatan</p>
                                    <p class="text-xl font-extrabold text-emerald-600 mb-4">Rp <span x-text="order.price.toLocaleString('id-ID')"></span></p>
                                    
                                    <template x-if="order.status === 'baru'">
                                        <button @click="processOrder(order)" class="w-full bg-emerald-500 text-white font-bold py-2 rounded-xl text-sm shadow cursor-pointer hover:bg-emerald-600 transition">Terima & Kemas</button>
                                    </template>
                                    <template x-if="order.status === 'diproses'">
                                        <button @click="openResiModal(order)" class="w-full border-2 border-emerald-500 text-emerald-600 font-bold py-2.5 rounded-xl text-sm shadow-sm hover:bg-emerald-50 transition">Input Resi & Kirim</button>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </template>

                    <!-- Empty State -->
                    <div x-show="orders.filter(o => o.status === activeTab).length === 0" class="text-center p-12 bg-white rounded-2xl border border-dashed border-slate-300">
                        <i class="fas fa-box-open text-4xl text-slate-300 mb-3"></i>
                        <p class="text-slate-500 font-medium">Tidak ada pesanan di kategori ini.</p>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <!-- Input Resi Modal -->
    <div x-cloak x-show="resiModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-60 backdrop-blur-sm p-4 text-left">
        <div x-show="resiModal" @click.away="resiModal = false" x-transition.scale class="bg-white rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl relative">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="font-bold text-xl text-slate-800">Kirim Pesanan</h3>
            </div>
            <div class="p-6">
                <p class="text-sm text-slate-500 mb-4">Pilih jasa logistik dan masukkan nomor resi untuk pesanan <strong x-text="activeOrder?.id"></strong>.</p>
                <div class="mb-4">
                    <label class="block text-sm font-bold text-slate-700 mb-2">Kurir Pengiriman</label>
                    <select class="w-full border border-slate-200 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-emerald-500">
                        <option>Kurir BUMDes (Lokal)</option>
                        <option>JNT Express</option>
                        <option>JNE Reguler</option>
                    </select>
                </div>
                <div class="mb-2">
                    <label class="block text-sm font-bold text-slate-700 mb-2">No. Resi Pengiriman</label>
                    <input type="text" placeholder="Kosongkan jika Kurir Lokal" x-model="resiNumber" class="w-full border border-slate-200 rounded-lg px-4 py-3 uppercase focus:outline-none focus:ring-2 focus:ring-emerald-500 font-bold text-slate-800 tracking-wider">
                </div>
            </div>
            <div class="px-6 py-4 border-t border-slate-100 flex justify-end gap-3 bg-slate-50">
                <button @click="resiModal = false" class="px-4 py-2 bg-slate-200 font-bold text-slate-600 rounded-lg transition">Batal</button>
                <button @click="shipOrder()" class="px-4 py-2 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-lg transition">Kirim Barang</button>
            </div>
        </div>
    </div>

    <script>
        function orderManager() {
            return {
                sidebarOpen: false, activeTab: 'baru', resiModal: false, activeOrder: null, resiNumber: '',
                toast: { show: false, msg: '', type: 'success' },
                orders: [
                    { id: '#ORD-99120', status: 'baru', time: '30 Menit yang lalu', title: 'Kopi Arabika Gayo Asli (2x)', customer: 'Bu Ratna (RT 01)', price: 130000, img: 'https://images.unsplash.com/photo-1559525839-b184a4d698c7?w=200&q=80', note: '' },
                    { id: '#ORD-99119', status: 'baru', time: '1 Jam yang lalu', title: 'Madu Hutan Liar Murni (1x)', customer: 'Pak Joko (RT 04)', price: 85000, img: 'https://images.unsplash.com/photo-1587049352847-4d4b1ed748d3?w=200&q=80', note: 'Tolong double bubble wrap' },
                    { id: '#ORD-99002', status: 'diproses', time: 'Kemarin', title: 'Keripik Singkong Level 5 (5x)', customer: 'Mbak Ajeng (Luaran Desa)', price: 75000, img: '', note: '' }
                ],
                showToast(msg, type='success') {
                    this.toast.msg = msg; this.toast.type = type; this.toast.show = true;
                    setTimeout(() => { this.toast.show = false; }, 3000);
                },
                processOrder(order) {
                    order.status = 'diproses';
                    this.showToast('Pesanan ' + order.id + ' dipindahkan ke tahap kemas!');
                },
                openResiModal(order) {
                    this.activeOrder = order; this.resiNumber = ''; this.resiModal = true;
                },
                shipOrder() {
                    this.activeOrder.status = 'dikirim';
                    this.resiModal = false;
                    this.showToast('Pesanan ' + this.activeOrder.id + ' telah dikirim!');
                }
            }
        }
    </script>
</body>
</html>
